<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐗 Kaban Fighting Game</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
    }
  </script>
</head>
<body>
  <!-- MENU -->
  <div id="menu">
    <h1 id="game-title">🐗 KABAN<br/><span>FIGHTING GAME</span></h1>
    <div id="menu-buttons">
      <button class="menu-btn" id="btn-vs-ai">⚔️ Кабан vs ИИ</button>
      <button class="menu-btn" id="btn-vs-player">👥 Кабан vs Ноунейм</button>
    </div>
    <p id="made-by">by Kaban 🐗</p>
  </div>

  <!-- GAME -->
  <div id="game" style="display:none;">
    <div id="hud">
      <div id="left-hud">
        <div class="fighter-name" id="p1-name">🐗 Кабан</div>
        <div class="health-bar-wrap">
          <div class="health-bar" id="p1-health"></div>
        </div>
      </div>
      <div id="timer-wrap">
        <div id="timer">60</div>
      </div>
      <div id="right-hud">
        <div class="fighter-name" id="p2-name">❓ Ноунейм</div>
        <div class="health-bar-wrap">
          <div class="health-bar" id="p2-health"></div>
        </div>
      </div>
    </div>

    <div id="result-display"></div>
    <canvas id="canvas"></canvas>

    <div id="controls-hint">
      <div class="control-block">
        <b>🐗 Кабан</b><br/>
        WASD — движение<br/>
        Пробел — удар
      </div>
      <div class="control-block" id="p2-controls">
        <b>❓ Ноунейм</b><br/>
        ← → ↑ — движение<br/>
        Alt — удар
      </div>
    </div>

    <button id="back-btn">← Меню</button>
  </div>

  <script src="../js/classes.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
